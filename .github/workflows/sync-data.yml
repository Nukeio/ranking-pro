name: Sync MT3 ranking data

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch MT3 leaderboard and push to Supabase via /api/ingest
        env:
          GAME_API_AUTH_HEADER: ${{ secrets.GAME_API_ACCESS_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: node scripts/fetch-and-sync.js
